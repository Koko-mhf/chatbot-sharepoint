<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zo — Assistant Microsoft 365</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div id="chat-container">
        <!-- Header -->
        <div id="chat-header">
            <div class="header-left">
                <div class="bot-avatar">
                    <svg class="sparkle-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L13.09 8.26L18 6L14.74 10.91L21 12L14.74 13.09L18 18L13.09 15.74L12 22L10.91 15.74L6 18L9.26 13.09L3 12L9.26 10.91L6 6L10.91 8.26L12 2Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="header-info">
                    <h1>Zo</h1>
                    <span class="status-text">
                        <span class="status-dot"></span>
                        Assistant Microsoft 365
                    </span>
                </div>
            </div>
            <button id="btn-clear" title="Nouvelle conversation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
            </button>
        </div>

        <!-- Messages -->
        <div id="chat-messages">
            <div class="message bot-message">
                <div class="message-avatar">
                    <svg class="sparkle-icon-sm" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L13.09 8.26L18 6L14.74 10.91L21 12L14.74 13.09L18 18L13.09 15.74L12 22L10.91 15.74L6 18L9.26 13.09L3 12L9.26 10.91L6 6L10.91 8.26L12 2Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="message-bubble">
                    <p>Bonjour, je suis <strong>Zo</strong>.</p>
                    <p>Je peux vous aider avec SharePoint, Teams, OneDrive et Power Automate. Posez-moi votre question.</p>
                </div>
            </div>
        </div>

        <!-- Quick suggestions -->
        <div id="quick-suggestions">
            <button class="suggestion" data-question="Comment créer un site SharePoint ?">Créer un site</button>
            <button class="suggestion" data-question="Comment gérer les permissions SharePoint ?">Permissions</button>
            <button class="suggestion" data-question="Comment partager un fichier OneDrive ?">Partage OneDrive</button>
            <button class="suggestion" data-question="Comment planifier une réunion Teams ?">Réunion Teams</button>
        </div>

        <!-- Input -->
        <div id="chat-input-container">
            <div class="input-wrapper">
                <textarea
                    id="chat-input"
                    placeholder="Posez votre question..."
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button id="btn-send" title="Envoyer">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <span class="input-hint">Zo utilise Groq + LLaMA 3</span>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
